<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Saiyasone Farm</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:15px;}
body{background:#f0f4f8;font-family:'DM Mono',monospace;color:#0d1b2a;min-height:100vh;}
.app{max-width:430px;margin:0 auto;padding:12px 10px 80px;}
.hdr{text-align:center;margin-bottom:16px;padding:18px 14px 16px;background:linear-gradient(135deg,#0d2b5e 0%,#1a3f7a 60%,#1e4d99 100%);border-radius:14px;box-shadow:0 4px 18px rgba(13,43,94,.3);}
.hdr-icon{font-size:32px;display:block;margin-bottom:5px;}
.hdr h1{font-family:'Playfair Display',serif;font-size:1.55rem;font-weight:900;color:#fff;line-height:1.1;}
.hdr p{margin-top:4px;font-size:0.62rem;color:#a8c4e8;letter-spacing:2px;text-transform:uppercase;}
.tabs{display:flex;gap:2px;margin-bottom:14px;background:#dbe6f4;padding:3px;border-radius:9px;}
.tab{flex:1;padding:8px 2px;border:none;background:transparent;font-family:'DM Mono',monospace;font-size:0.6rem;font-weight:500;letter-spacing:0.8px;text-transform:uppercase;color:#4a6fa5;border-radius:7px;cursor:pointer;transition:all 0.15s;line-height:1.3;}
.tab.active{background:#0d2b5e;color:#fff;box-shadow:0 2px 6px rgba(13,43,94,.3);}
.tab:hover:not(.active){background:#c2d5ee;color:#0d2b5e;}
.card{background:#fff;border:1.5px solid #c2d5ee;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(13,43,94,.06);}
.card-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:#0d2b5e;margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg.full{grid-column:1/-1;}
label{font-size:0.62rem;letter-spacing:1.5px;text-transform:uppercase;color:#4a6fa5;font-weight:500;display:block;margin-bottom:3px;}
input,select,textarea{background:#f5f8fc;border:1.5px solid #b0c8e8;border-radius:8px;padding:9px 10px;font-family:'DM Mono',monospace;font-size:0.88rem;color:#0d1b2a;transition:border-color .15s,box-shadow .15s;outline:none;width:100%;}
input:focus,select:focus,textarea:focus{border-color:#0d2b5e;box-shadow:0 0 0 3px rgba(13,43,94,.1);}
textarea{resize:vertical;min-height:60px;}
.btn{padding:12px 18px;border:none;border-radius:9px;font-family:'DM Mono',monospace;font-size:0.75rem;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;transition:all .15s;display:inline-block;}
.btn-primary{background:#0d2b5e;color:#fff;box-shadow:0 3px 10px rgba(13,43,94,.28);width:100%;margin-top:12px;}
.btn-primary:hover{background:#09204a;}
.btn-sm{padding:5px 9px;font-size:0.62rem;}
.btn-danger{background:transparent;color:#c0392b;border:1px solid rgba(192,57,43,.27);}
.btn-danger:hover{background:#ffeaea;}
.btn-outline{background:transparent;color:#0d2b5e;border:1.5px solid #0d2b5e;font-size:0.68rem;padding:8px 12px;}
.btn-outline:hover{background:#dbe6f4;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.stat{background:linear-gradient(135deg,#fff,#eef3fa);border:1.5px solid #c2d5ee;border-radius:10px;padding:12px 8px;text-align:center;}
.stat-val{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:#0d2b5e;line-height:1;margin-bottom:3px;word-break:break-word;}
.stat-lbl{font-size:0.58rem;letter-spacing:1.2px;text-transform:uppercase;color:#4a6fa5;}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:0.72rem;}
thead tr{border-bottom:2px solid #c2d5ee;}
th{font-size:0.58rem;letter-spacing:1.4px;text-transform:uppercase;color:#4a6fa5;padding:7px 6px;text-align:left;white-space:nowrap;}
td{padding:9px 6px;border-bottom:1px solid #e8f0f8;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#eef3fa;}
.totals-row td{font-weight:600;color:#0d2b5e;background:#dbe6f4!important;border-top:2px solid #c2d5ee;}
.badge{display:inline-block;padding:2px 6px;border-radius:20px;font-size:0.58rem;letter-spacing:.6px;font-weight:500;}
.badge-br{background:#dbe6f4;color:#0d2b5e;}
.empty{text-align:center;padding:28px 16px;color:#7a9cc0;}
.empty .ico{font-size:32px;margin-bottom:7px;}
.empty p{font-size:0.75rem;}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.filter-row{display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.filter-row select,.filter-row input[type=month]{width:auto;font-size:0.72rem;padding:7px 8px;}
.preview-box{margin:10px 0 14px;padding:10px 12px;background:#dbe6f4;border-radius:8px;font-size:0.78rem;color:#0d2b5e;font-weight:500;}
.info-pill{display:inline-block;background:#dbe6f4;color:#0d2b5e;border-radius:6px;padding:2px 7px;font-size:0.66rem;font-weight:500;}
.tray-visual{display:flex;flex-wrap:wrap;gap:3px;margin-top:7px;}
.egg-dot{width:11px;height:14px;border-radius:50% 50% 50% 50%/60% 60% 40% 40%;background:#e8f0f8;border:1px solid #b0c8e8;display:inline-block;}
.egg-dot.partial{background:#1a3f7a;border-color:#0d2b5e;}
.month-hdr{font-family:'Playfair Display',serif;font-size:0.92rem;font-weight:700;color:#0d2b5e;padding:8px 0 5px;border-bottom:1px dashed #b0c8e8;margin-bottom:9px;margin-top:14px;}
.year-total{padding:11px 13px;background:#dbe6f4;border-radius:9px;margin-top:6px;display:flex;justify-content:space-between;align-items:center;}
.stock-bar{background:#dbe6f4;border-radius:8px;height:11px;overflow:hidden;margin-top:4px;}
.stock-bar-fill{height:100%;background:linear-gradient(90deg,#1a3f7a,#0d2b5e);border-radius:8px;}
.info-box{padding:10px 14px;border-radius:8px;font-size:0.78rem;margin-bottom:14px;}
.info-box-blue{background:#dbe6f4;color:#0d2b5e;}
.info-box-green{background:#e4f5e4;color:#1a6b2e;}
.hidden{display:none;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0d2b5e;color:#fff;padding:10px 20px;border-radius:20px;font-size:0.74rem;letter-spacing:1px;z-index:9999;white-space:nowrap;opacity:0;transition:opacity .25s;}
.toast.show{opacity:1;}
@media print{.tabs,.btn,.filter-row{display:none!important;}.card{box-shadow:none;border:1px solid #ccc;}}
</style>
</head>
<body>
<div class="app">
  <div class="toast" id="toast"></div>

  <div class="hdr">
    <span class="hdr-icon">🥚</span>
    <h1>Saiyasone Farm</h1>
    <p> </p>
  </div>

  <!-- Top stats -->
  <div class="stat-grid" id="topStats"></div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('stock')">🥚 Stock</button>
    <button class="tab" onclick="switchTab('sell')">💰 Sell</button>
    <button class="tab" onclick="switchTab('daily')">📅 Daily</button>
    <button class="tab" onclick="switchTab('monthly')">📆 Monthly</button>
    <button class="tab" onclick="switchTab('annual')">📊 Annual</button>
  </div>

  <!-- STOCK TAB -->
  <div class="tab-panel active" id="panel-stock">
    <div class="card">
      <div class="card-title">🥚 Log Daily Collection</div>
      <div class="grid2">
        <div class="fg"><label>Date</label><input type="date" id="st-date"/></div>
        <div class="fg"><label>Eggs Collected</label><input type="number" id="st-eggs" min="1" step="1" placeholder="e.g. 14" oninput="updateStockPreview()"/></div>
        <div class="fg full"><label>Notes (optional)</label><input type="text" id="st-notes" placeholder="Any notes..."/></div>
      </div>
      <div id="stock-preview" class="preview-box hidden"></div>
      <button class="btn btn-primary" onclick="addStock()">Save Collection</button>
    </div>
    <div class="card">
      <div class="card-title">📦 Stock Overview</div>
      <div class="stat-grid" id="stockStats"></div>
      <div id="trayVisual" style="margin-bottom:16px;"></div>
      <div style="font-size:0.68rem;letter-spacing:1.8px;text-transform:uppercase;color:#4a6fa5;margin-bottom:10px;">Collection History</div>
      <div id="stockHistory"></div>
    </div>
  </div>

  <!-- SELL TAB -->
  <div class="tab-panel hidden" id="panel-sell">
    <div class="card">
      <div class="card-title">💰 Record a Sale</div>
      <div id="sellStockInfo" class="info-box info-box-blue"></div>
      <div class="grid2">
        <div class="fg"><label>Date</label><input type="date" id="sl-date"/></div>
        <div class="fg"><label>Egg Type</label>
          <select id="sl-type">
            <option>White Eggs</option><option>Brown Eggs</option><option>Free Range</option>
            <option>Organic</option><option>Duck Eggs</option><option>Other</option>
          </select>
        </div>
        <div class="fg"><label>Trays Sold</label><input type="number" id="sl-trays" min="0" step="0.5" placeholder="e.g. 2" oninput="updateSalePreview()"/></div>
        <div class="fg"><label>Price per Tray (₭)</label><input type="number" id="sl-price" min="0" step="1" placeholder="e.g. 15000" oninput="updateSalePreview()"/></div>
        <div class="fg full"><label>Buyer / Customer (optional)</label><input type="text" id="sl-buyer" placeholder="e.g. Market, John Doe"/></div>
        <div class="fg full"><label>Notes (optional)</label><textarea id="sl-notes" placeholder="Any notes..."></textarea></div>
      </div>
      <div id="sale-preview" class="preview-box hidden"></div>
      <button class="btn btn-primary" onclick="addSale()">Save Sale</button>
      <div id="recentSales"></div>
    </div>
  </div>

  <!-- DAILY TAB -->
  <div class="tab-panel hidden" id="panel-daily">
    <div class="card">
      <div class="sec-hdr">
        <div class="card-title" style="margin:0">📅 Daily Report</div>
        <div class="filter-row">
          <input type="month" id="filter-month" onchange="renderDaily()"/>
          <button class="btn btn-outline btn-sm" onclick="window.print()">🖨 Print</button>
        </div>
      </div>
      <div id="dailyContent"></div>
    </div>
  </div>

  <!-- MONTHLY TAB -->
  <div class="tab-panel hidden" id="panel-monthly">
    <div class="card">
      <div class="sec-hdr">
        <div class="card-title" style="margin:0">📆 Monthly Report</div>
        <div class="filter-row">
          <select id="filter-year" onchange="renderMonthly()"></select>
          <button class="btn btn-outline btn-sm" onclick="window.print()">🖨 Print</button>
        </div>
      </div>
      <div id="monthlyContent"></div>
    </div>
  </div>

  <!-- ANNUAL TAB -->
  <div class="tab-panel hidden" id="panel-annual">
    <div class="card">
      <div class="sec-hdr">
        <div class="card-title" style="margin:0">📊 Annual Summary</div>
        <button class="btn btn-outline btn-sm" onclick="window.print()">🖨 Print</button>
      </div>
      <div id="annualContent"></div>
    </div>
  </div>
</div>

<script>
const SALES_KEY = 'saiyasone-sales';
const STOCK_KEY = 'saiyasone-stock';
const EPT = 30;
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let sales = [], stock = [];

// ── Storage ──
function loadData() {
  try { sales = JSON.parse(localStorage.getItem(SALES_KEY)) || []; } catch { sales = []; }
  try { stock = JSON.parse(localStorage.getItem(STOCK_KEY)) || []; } catch { stock = []; }
}
function saveSalesData() { localStorage.setItem(SALES_KEY, JSON.stringify(sales)); }
function saveStockData() { localStorage.setItem(STOCK_KEY, JSON.stringify(stock)); }

// ── Helpers ──
function fc(v) { return '₭' + Number(v||0).toLocaleString('en-US',{maximumFractionDigits:0}); }
function fd(s) { if(!s) return ''; const [y,m,d]=s.split('-'); return `${d}/${m}/${y}`; }
function todayStr() { return new Date().toISOString().slice(0,10); }
function toTrays(e) { return { trays: Math.floor(e/EPT), rem: e%EPT }; }
function trayLabel(e) {
  const {trays,rem} = toTrays(e);
  if(trays===0) return `${rem} eggs`;
  if(rem===0) return `${trays} tray${trays>1?'s':''}`;
  return `${trays} tray${trays>1?'s':''} + ${rem} eggs`;
}
function totalEggsCollected() { return stock.reduce((s,r)=>s+r.eggs,0); }
function totalEggsSold() { return sales.reduce((s,r)=>s+r.trays*EPT,0); }
function stockOnHand() { return Math.max(0, totalEggsCollected()-totalEggsSold()); }
function getYears() {
  const ys = [...new Set([...sales.map(r=>r.date.slice(0,4)),...stock.map(r=>r.date.slice(0,4))])].sort((a,b)=>b-a);
  const cy = String(new Date().getFullYear());
  if(!ys.includes(cy)) ys.unshift(cy);
  return ys;
}
function monthLabel(m) { const [y,mo]=m.split('-'); return `${MONTHS[parseInt(mo)-1]} ${y}`; }

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

// ── Tab switching ──
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((b,i)=>{
    const names=['stock','sell','daily','monthly','annual'];
    b.classList.toggle('active', names[i]===name);
  });
  document.querySelectorAll('.tab-panel').forEach(p=>{
    p.classList.remove('active');
    p.classList.add('hidden');
  });
  const panel = document.getElementById('panel-'+name);
  panel.classList.remove('hidden');
  panel.classList.add('active');
  if(name==='daily') renderDaily();
  if(name==='monthly') renderMonthly();
  if(name==='annual') renderAnnual();
  renderAll();
}

// ── Render top stats ──
function renderTopStats() {
  const soh = stockOnHand();
  const tec = totalEggsCollected();
  const tSold = sales.reduce((s,r)=>s+r.trays,0);
  const income = sales.reduce((s,r)=>s+r.total,0);
  document.getElementById('topStats').innerHTML = `
    <div class="stat"><div class="stat-val">${trayLabel(soh)}</div><div class="stat-lbl">Stock on Hand</div></div>
    <div class="stat"><div class="stat-val">${trayLabel(tec)}</div><div class="stat-lbl">Total Collected</div></div>
    <div class="stat"><div class="stat-val">${tSold} trays</div><div class="stat-lbl">Total Sold</div></div>
    <div class="stat"><div class="stat-val">${fc(income)}</div><div class="stat-lbl">Total Income</div></div>
  `;
}

// ── Render stock tab ──
function renderStockTab() {
  const tec = totalEggsCollected();
  const tes = totalEggsSold();
  const soh = stockOnHand();
  const {trays: traysOH, rem: remOH} = toTrays(soh);

  document.getElementById('stockStats').innerHTML = `
    <div class="stat"><div class="stat-val">${tec}</div><div class="stat-lbl">Collected (eggs)</div></div>
    <div class="stat"><div class="stat-val">${tes}</div><div class="stat-lbl">Sold (eggs)</div></div>
    <div class="stat"><div class="stat-val" style="color:${soh===0?'#4a6fa5':'#0d2b5e'}">${soh}</div><div class="stat-lbl">On Hand (eggs)</div></div>
    <div class="stat"><div class="stat-val">${trayLabel(soh)}</div><div class="stat-lbl">On Hand (trays)</div></div>
  `;

  let trayHTML = `<div style="font-size:0.68rem;letter-spacing:1.5px;text-transform:uppercase;color:#4a6fa5;margin-bottom:8px;">
    On Hand = ${traysOH>0?traysOH+' complete tray'+(traysOH>1?'s':'')+' ':''} ${remOH>0?'+ '+remOH+' loose egg'+(remOH>1?'s':''):''}${soh===0?'No eggs in stock':''}
  </div>`;
  if(remOH > 0) {
    let dots = '';
    for(let i=0;i<EPT;i++) dots += `<div class="egg-dot${i<remOH?' partial':''}"></div>`;
    trayHTML += `<div style="font-size:0.7rem;color:#4a6fa5;margin-bottom:5px;">Partial tray: ${remOH}/${EPT} eggs</div>
    <div class="tray-visual">${dots}</div>`;
  }
  document.getElementById('trayVisual').innerHTML = trayHTML;

  // History with running totals
  const sorted = [...stock].sort((a,b)=>a.date.localeCompare(b.date));
  let running = 0;
  const withRunning = sorted.map(r=>{ running+=r.eggs; return {...r,running}; }).reverse();

  if(withRunning.length===0) {
    document.getElementById('stockHistory').innerHTML = `<div class="empty"><div class="ico">🐔</div><p>No collections yet. Log your first batch!</p></div>`;
    return;
  }
  let rows = withRunning.map(r=>{
    const {trays,rem} = toTrays(r.eggs);
    const rt = toTrays(r.running);
    const trayStr = (trays>0?trays+'T':'')+(trays>0&&rem>0?' + ':'')+(rem>0?rem+' eggs':'')+(trays===0&&rem===0?'0':'');
    const runStr = (rt.trays>0?rt.trays+' tray'+(rt.trays>1?'s':''):'')+(rt.trays>0&&rt.rem>0?' + ':'')+(rt.rem>0?rt.rem+' eggs':'')+(r.running===0?'0 eggs':'');
    return `<tr>
      <td>${fd(r.date)}</td>
      <td><b style="color:#0d2b5e">${r.eggs}</b></td>
      <td><span class="badge badge-br">${trayStr}</span></td>
      <td><span class="info-pill">${runStr}</span></td>
      <td style="color:#4a6fa5;font-size:0.72rem">${r.notes||'—'}</td>
      <td><button class="btn btn-danger btn-sm" onclick="delStock(${r.id})">✕</button></td>
    </tr>`;
  }).join('');
  document.getElementById('stockHistory').innerHTML = `
    <div class="table-wrap"><table>
      <thead><tr><th>Date</th><th>Eggs</th><th>In Trays</th><th>Running Total</th><th>Notes</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

// ── Render sell tab ──
function renderSellTab() {
  const soh = stockOnHand();
  document.getElementById('sellStockInfo').innerHTML = `📦 Available stock: <b>${trayLabel(soh)}</b> (${soh} eggs)`;

  if(sales.length===0){ document.getElementById('recentSales').innerHTML=''; return; }
  let rows = sales.slice(0,10).map(r=>`<tr>
    <td>${fd(r.date)}</td>
    <td><span class="badge badge-br">${r.eggType}</span></td>
    <td><b style="color:#0d2b5e">${r.trays}</b></td>
    <td>${fc(r.pricePerTray)}</td>
    <td style="font-weight:600;color:#0d2b5e">${fc(r.total)}</td>
    <td style="color:#4a6fa5;font-size:0.72rem">${r.buyer||'—'}</td>
    <td><button class="btn btn-danger btn-sm" onclick="delSale(${r.id})">✕</button></td>
  </tr>`).join('');
  document.getElementById('recentSales').innerHTML = `
    <div style="margin-top:14px;">
      <div style="font-size:0.68rem;letter-spacing:1.8px;text-transform:uppercase;color:#4a6fa5;margin-bottom:10px;">Recent Sales</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Date</th><th>Type</th><th>Trays</th><th>₭/Tray</th><th>Total</th><th>Buyer</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
}

// ── Preview helpers ──
function updateStockPreview() {
  const n = parseInt(document.getElementById('st-eggs').value);
  const box = document.getElementById('stock-preview');
  if(!n||n<1){ box.classList.add('hidden'); return; }
  const {trays,rem} = toTrays(n);
  let msg = `🥚 <b>${n}</b> eggs = <b>${trayLabel(n)}</b>`;
  if(rem>0) msg += ` &nbsp;<span style="color:#4a6fa5;font-size:0.75rem">Need ${EPT-rem} more for next tray</span>`;
  else msg += ` &nbsp;<span style="color:#1a6b2e;font-size:0.75rem">✓ ${trays} complete tray(s)</span>`;
  box.innerHTML = msg;
  box.classList.remove('hidden');
}
function updateSalePreview() {
  const t = parseFloat(document.getElementById('sl-trays').value);
  const p = parseFloat(document.getElementById('sl-price').value);
  const box = document.getElementById('sale-preview');
  if(!t||!p){ box.classList.add('hidden'); return; }
  box.innerHTML = `🥚 ${t} tray(s) × ${fc(p)} = <b>${fc(t*p)}</b> &nbsp;<span style="color:#4a6fa5">= ${t*EPT} eggs</span>`;
  box.classList.remove('hidden');
}

// ── Add stock ──
function addStock() {
  const date = document.getElementById('st-date').value;
  const eggs = parseInt(document.getElementById('st-eggs').value);
  const notes = document.getElementById('st-notes').value.trim();
  if(!date||!eggs||eggs<1){ alert('Please enter the date and a valid egg count.'); return; }
  stock.push({id:Date.now(), date, eggs, notes});
  stock.sort((a,b)=>b.date.localeCompare(a.date));
  saveStockData();
  document.getElementById('st-eggs').value='';
  document.getElementById('st-notes').value='';
  document.getElementById('stock-preview').classList.add('hidden');
  showToast(`✓ ${eggs} eggs logged`);
  renderAll();
}

// ── Add sale ──
function addSale() {
  const date = document.getElementById('sl-date').value;
  const eggType = document.getElementById('sl-type').value;
  const trays = parseFloat(document.getElementById('sl-trays').value);
  const pricePerTray = parseFloat(document.getElementById('sl-price').value);
  const buyer = document.getElementById('sl-buyer').value.trim();
  const notes = document.getElementById('sl-notes').value.trim();
  if(!date||!trays||!pricePerTray){ alert('Please fill in Date, Trays Sold, and Price per Tray.'); return; }
  sales.push({id:Date.now(), date, eggType, trays, pricePerTray, total:trays*pricePerTray, buyer, notes});
  sales.sort((a,b)=>b.date.localeCompare(a.date));
  saveSalesData();
  document.getElementById('sl-trays').value='';
  document.getElementById('sl-price').value='';
  document.getElementById('sl-buyer').value='';
  document.getElementById('sl-notes').value='';
  document.getElementById('sale-preview').classList.add('hidden');
  showToast('✓ Sale recorded');
  renderAll();
}

// ── Delete ──
function delStock(id) {
  if(!confirm('Delete this entry?')) return;
  stock = stock.filter(r=>r.id!==id);
  saveStockData(); showToast('Deleted'); renderAll();
}
function delSale(id) {
  if(!confirm('Delete this sale?')) return;
  sales = sales.filter(r=>r.id!==id);
  saveSalesData(); showToast('Deleted'); renderAll();
}

// ── Daily Report ──
function renderDaily() {
  const fm = document.getElementById('filter-month').value;
  const ds = sales.filter(r=>r.date.startsWith(fm));
  const dstock = stock.filter(r=>r.date.startsWith(fm));
  const collectedEggs = dstock.reduce((s,r)=>s+r.eggs,0);
  const income = ds.reduce((s,r)=>s+r.total,0);
  const traysSold = ds.reduce((s,r)=>s+r.trays,0);

  let html = `<div class="info-box info-box-green">🐔 Collected this month: <b>${collectedEggs} eggs</b> = <b>${trayLabel(collectedEggs)}</b></div>
  <div class="stat-grid" style="margin-bottom:14px;">
    <div class="stat"><div class="stat-val">${fc(income)}</div><div class="stat-lbl">Month Income</div></div>
    <div class="stat"><div class="stat-val">${traysSold} trays</div><div class="stat-lbl">Trays Sold</div></div>
    <div class="stat"><div class="stat-val">${ds.length}</div><div class="stat-lbl">Transactions</div></div>
  </div>`;

  if(ds.length===0){ html += `<div class="empty"><div class="ico">🥚</div><p>No sales for ${monthLabel(fm)}</p></div>`; }
  else {
    let rows = ds.map(r=>`<tr>
      <td>${fd(r.date)}</td><td><span class="badge badge-br">${r.eggType}</span></td>
      <td><b style="color:#0d2b5e">${r.trays}</b></td>
      <td style="color:#4a6fa5">${r.trays*EPT}</td>
      <td>${fc(r.pricePerTray)}</td>
      <td style="font-weight:600;color:#0d2b5e">${fc(r.total)}</td>
      <td style="color:#4a6fa5;font-size:0.72rem">${r.buyer||'—'}</td>
      <td><button class="btn btn-danger btn-sm" onclick="delSale(${r.id});switchTab('daily')">✕</button></td>
    </tr>`).join('');
    rows += `<tr class="totals-row">
      <td colspan="2"><b>TOTAL</b></td>
      <td><b>${traysSold}</b></td><td><b>${traysSold*EPT}</b></td><td></td>
      <td><b>${fc(income)}</b></td><td colspan="2"></td>
    </tr>`;
    html += `<div class="table-wrap"><table>
      <thead><tr><th>Date</th><th>Type</th><th>Trays</th><th>Eggs</th><th>₭/Tray</th><th>Total</th><th>Buyer</th><th></th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  }
  document.getElementById('dailyContent').innerHTML = html;
}

// ── Monthly Report ──
function renderMonthly() {
  const fy = document.getElementById('filter-year').value;
  const filtered = sales.filter(r=>r.date.startsWith(fy));
  const groups = {};
  filtered.forEach(r=>{
    const m = r.date.slice(0,7);
    if(!groups[m]) groups[m]={month:m,records:[],total:0,trays:0};
    groups[m].records.push(r); groups[m].total+=r.total; groups[m].trays+=r.trays;
  });
  const mData = Object.values(groups).sort((a,b)=>b.month.localeCompare(a.month));

  if(mData.length===0){ document.getElementById('monthlyContent').innerHTML=`<div class="empty"><div class="ico">📦</div><p>No sales for ${fy}</p></div>`; return; }

  let html = '';
  mData.forEach(mg=>{
    let rows = mg.records.sort((a,b)=>a.date.localeCompare(b.date)).map(r=>`<tr>
      <td>${fd(r.date)}</td><td><span class="badge badge-br">${r.eggType}</span></td>
      <td><b style="color:#0d2b5e">${r.trays}</b></td>
      <td style="color:#4a6fa5">${r.trays*EPT}</td>
      <td>${fc(r.pricePerTray)}</td>
      <td style="font-weight:600;color:#0d2b5e">${fc(r.total)}</td>
      <td style="color:#4a6fa5;font-size:0.72rem">${r.buyer||'—'}</td>
    </tr>`).join('');
    rows += `<tr class="totals-row"><td colspan="2"><b>MONTH TOTAL</b></td><td><b>${mg.trays}</b></td><td><b>${mg.trays*EPT}</b></td><td></td><td><b>${fc(mg.total)}</b></td><td></td></tr>`;
    html += `<div class="month-hdr">${monthLabel(mg.month)}</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Date</th><th>Type</th><th>Trays</th><th>Eggs</th><th>₭/Tray</th><th>Total</th><th>Buyer</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  });
  const yearTotal = mData.reduce((s,m)=>s+m.total,0);
  html += `<div class="year-total">
    <span style="font-size:0.72rem;letter-spacing:1px;text-transform:uppercase;color:#4a6fa5;">Year ${fy} Total</span>
    <span style="font-family:'Playfair Display',serif;font-weight:700;font-size:1.25rem;color:#0d2b5e;">${fc(yearTotal)}</span>
  </div>`;
  document.getElementById('monthlyContent').innerHTML = html;
}

// ── Annual Report ──
function renderAnnual() {
  const groups = {};
  sales.forEach(r=>{
    const y = r.date.slice(0,4);
    if(!groups[y]) groups[y]={year:y,total:0,trays:0,count:0};
    groups[y].total+=r.total; groups[y].trays+=r.trays; groups[y].count++;
  });
  const aData = Object.values(groups).sort((a,b)=>b.year-a.year);

  if(aData.length===0){ document.getElementById('annualContent').innerHTML=`<div class="empty"><div class="ico">🌾</div><p>No sales yet. Start recording!</p></div>`; return; }

  let rows = aData.map(r=>`<tr>
    <td><b style="font-family:'Playfair Display',serif;font-size:1rem;color:#0d2b5e">${r.year}</b></td>
    <td>${r.trays}</td><td style="color:#4a6fa5">${r.trays*EPT}</td><td>${r.count}</td>
    <td>${fc(r.total/r.count)}</td>
    <td style="font-weight:700;color:#0d2b5e;font-family:'Playfair Display',serif;font-size:1rem">${fc(r.total)}</td>
  </tr>`).join('');
  const totT=aData.reduce((s,r)=>s+r.trays,0), totI=aData.reduce((s,r)=>s+r.total,0), totC=aData.reduce((s,r)=>s+r.count,0);
  rows += `<tr class="totals-row"><td><b>ALL</b></td><td><b>${totT}</b></td><td><b>${totT*EPT}</b></td><td><b>${totC}</b></td><td></td><td><b>${fc(totI)}</b></td></tr>`;

  const max = Math.max(...aData.map(r=>r.total));
  let bars = aData.map(r=>{
    const pct = max>0?(r.total/max)*100:0;
    return `<div style="margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;font-size:0.74rem;margin-bottom:3px;">
        <span style="color:#0d2b5e;font-weight:500">${r.year}</span>
        <span style="color:#09204a;font-weight:700">${fc(r.total)}</span>
      </div>
      <div class="stock-bar"><div class="stock-bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');

  document.getElementById('annualContent').innerHTML = `
    <div class="table-wrap"><table>
      <thead><tr><th>Year</th><th>Trays</th><th>Eggs</th><th>Sales</th><th>Avg/Sale</th><th>Total</th></tr></thead>
      <tbody>${rows}</tbody></table></div>
    <div style="margin-top:14px;">
      <div style="font-size:0.66rem;letter-spacing:1.8px;text-transform:uppercase;color:#4a6fa5;margin-bottom:10px;">Income by Year</div>
      ${bars}
    </div>`;
}

// ── Populate year selector ──
function populateYearSelect() {
  const sel = document.getElementById('filter-year');
  const years = getYears();
  const cur = sel.value || String(new Date().getFullYear());
  sel.innerHTML = years.map(y=>`<option value="${y}"${y===cur?' selected':''}>${y}</option>`).join('');
}

// ── Render all ──
function renderAll() {
  renderTopStats();
  renderStockTab();
  renderSellTab();
  populateYearSelect();
  // Re-render active report if visible
  const active = document.querySelector('.tab-panel.active');
  if(active && active.id==='panel-daily') renderDaily();
  if(active && active.id==='panel-monthly') renderMonthly();
  if(active && active.id==='panel-annual') renderAnnual();
}

// ── Init ──
window.addEventListener('DOMContentLoaded', ()=>{
  loadData();
  // Set default dates
  document.getElementById('st-date').value = todayStr();
  document.getElementById('sl-date').value = todayStr();
  // Set default month filter
  const now = new Date();
  document.getElementById('filter-month').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  populateYearSelect();
  renderAll();
});
</script>
</body>
